<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Quest - Đức Anh Thu Sâm</title>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #96e6a1; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        
        .main-card { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; position: relative; padding-bottom: 20px;}
        
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #f8f9fa; }
        .user-avatar { width: 40px; height: 40px; background: #ddd; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .admin-gear { cursor: pointer; font-size: 24px; color: #7f8c8d; transition: 0.3s; }
        .admin-gear:hover { transform: rotate(90deg); color: var(--dark); }

        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .stats-section { padding: 20px; text-align: center; }
        
        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; overflow-y: auto;}
        .modal-active { display: block; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-main { background: var(--primary); color: white; }
        .btn-close { background: #e74c3c; color: white; }

        .score-circle { width: 100px; height: 100px; border: 5px solid #eee; border-top: 5px solid orange; border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; justify-content: center; }
        .garden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .plant-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        .plant-card:disabled { filter: grayscale(1); opacity: 0.5; }

        .newbie-tasks { background: #fffde7; padding: 15px; border-radius: 15px; border: 2px solid #fbc02d; margin: 0 20px; text-align: left; }
        .newbie-tasks h4 { margin: 0 0 10px 0; color: #f57f17; }
        .task-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #fff9c4; font-size: 13px; }
        .task-actions { display: flex; gap: 5px; margin-top: 5px; }
        
        .btn-link { background: #2196F3; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; text-decoration: none; flex: 1; text-align: center; }
        .btn-verify { background: #f57f17; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; flex: 1; display: none; }
        .btn-done-status { background: #ccc; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: not-allowed; font-size: 11px; width: 100%; margin-top: 5px; }

        /* CSS CHO BẢNG ADMIN MỚI */
        .admin-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 10px; }
        .admin-table th { background: #f2f2f2; padding: 8px; text-align: left; border-bottom: 2px solid #ddd; }
        .admin-table td { padding: 8px; border-bottom: 1px solid #eee; }
        .btn-action { padding: 4px; cursor: pointer; border: none; border-radius: 4px; color: white; margin-right: 2px; }
        .status-on { color: #27ae60; font-weight: bold; }
        .status-off { color: #95a5a6; }
        .status-blocked { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="top-bar">
        <div class="user-avatar" onclick="toggleModal('auth-modal')">👤</div>
        <div id="username-display" style="font-weight: bold; color: var(--primary);">Khách</div>
        <div class="admin-gear" onclick="openAdmin()">⚙️</div>
    </div>

    <div class="header">
        <h2 style="margin:0">Vườn Cây Acc Free</h2>
        <small id="current-date"></small>
    </div>

    <div class="stats-section">
        <div class="score-circle">
            <span id="score-num" style="font-size: 24px; font-weight: bold;">0</span>
            <span style="font-size: 10px;">/ 200 ĐIỂM</span>
        </div>
        <p id="task-msg" style="font-weight: bold; color: #d35400; margin-bottom: 10px;">Lượt hôm nay: <span id="tasks-left">4</span>/4</p>

        <div class="garden-grid">
            <button class="plant-card" onclick="grow(3)">🥬<br>Cải (+3)</button>
            <button class="plant-card" onclick="grow(5)">🍆<br>Cà Tím (+5)</button>
            <button class="plant-card" onclick="grow(7)">🍅<br>Cà Chua (+7)</button>
            <button class="plant-card" onclick="grow(10)">🥕<br>Cà Rốt (+10)</button>
        </div>
    </div>

    <div class="newbie-tasks">
        <h4>🎁 Nhiệm vụ người mới</h4>
        
        <div class="task-item" id="task-yt-box">
            <span>1. Đăng ký YouTube (+20đ)</span>
            <div class="task-actions" id="yt-actions">
                <a href="https://youtube.com/@nhancodeptg05?si=7iy-tsSn4bhwDxkg" target="_blank" class="btn-link" onclick="showVerify('yt')">Mở Link YouTube</a>
                <button id="yt-verify" class="btn-verify" onclick="completeTask('yt')">Xác Nhận Đã Đăng Ký</button>
            </div>
        </div>

        <div class="task-item" id="task-tt-box">
            <span>2. Follow TikTok (+20đ)</span>
            <div class="task-actions" id="tt-actions">
                <a href="https://www.tiktok.com/@thusamplay_2410?_r=1&_t=ZS-94gpWyVlmr7" target="_blank" class="btn-link" onclick="showVerify('tt')">Mở Link TikTok</a>
                <button id="tt-verify" class="btn-verify" onclick="completeTask('tt')">Xác Nhận Đã Follow</button>
            </div>
        </div>
    </div>

    <div id="reward-link" style="display:none; margin: 20px; border: 2px dashed green; padding: 15px; text-align: center; background: #e8f5e9;">
        <p style="margin:0; font-weight: bold;">🏆 ĐÃ ĐỦ 200 ĐIỂM!</p>
        <a href="https://www.tiktok.com/@thusamplay_2410?_r=1&_t=ZS-94gpWyVlmr7" target="_blank" style="color: #1b5e20; font-weight: bold;">BẤM VÀO ĐÂY NHẬN ACC TẠI TIKTOK</a>
    </div>

    <div id="auth-modal" class="modal">
        <h3 id="auth-title">Đăng Ký Tài Khoản</h3>
        <input type="text" id="auth-user" placeholder="Tên đăng nhập">
        <input type="password" id="auth-pass" placeholder="Mật khẩu">
        <button class="btn btn-main" onclick="handleAuth()">Xác Nhận</button>
        <button class="btn" style="background:#ddd" onclick="switchAuth()">Chuyển sang Đăng nhập/Đăng ký</button>
        <button class="btn" style="background:#e67e22; color:white" onclick="logout()">Đăng Xuất</button>
        <button class="btn btn-close" onclick="toggleModal('auth-modal')">Đóng</button>
    </div>

    <div id="admin-modal" class="modal">
        <h3>Quản Trị Viên (Admin)</h3>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>User (Pass)</th>
                    <th>Điểm</th>
                    <th>Trạng thái</th>
                    <th>Lệnh</th>
                </tr>
            </thead>
            <tbody id="admin-user-list-body"></tbody>
        </table>
        <br>
        <button class="btn btn-close" onclick="toggleModal('admin-modal')">Thoát Admin</button>
    </div>
</div>

<script>
    let users = JSON.parse(localStorage.getItem('garden_users')) || {};
    let currentUser = localStorage.getItem('garden_currentUser') || null;
    let isLoginMode = false;
    document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN');

    // Khởi tạo giao diện nếu đã đăng nhập trước đó
    if(currentUser) {
        document.getElementById('username-display').innerText = currentUser;
        updateUI();
    }

    function toggleModal(id) { document.getElementById(id).classList.toggle('modal-active'); }
    function switchAuth() { isLoginMode = !isLoginMode; document.getElementById('auth-title').innerText = isLoginMode ? "Đăng Nhập" : "Đăng Ký Tài Khoản"; }

    function handleAuth() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Vui lòng điền đủ!");

        if (isLoginMode) {
            if (users[u] && users[u].pass === p) {
                if(users[u].isBlocked) return alert("Tài khoản của bạn đã bị Admin khóa!");
                currentUser = u;
            } else { return alert("Sai tài khoản hoặc mật khẩu!"); }
        } else {
            if (users[u]) return alert("Tên đã tồn tại!");
            users[u] = { pass: p, score: 0, tasksDone: 0, lastDate: "", ytDone: false, ttDone: false, isBlocked: false };
            currentUser = u;
        }
        localStorage.setItem('garden_currentUser', currentUser);
        document.getElementById('username-display').innerText = currentUser;
        saveData();
        toggleModal('auth-modal');
        updateUI();
    }

    function logout() {
        localStorage.removeItem('garden_currentUser');
        location.reload();
    }

    function showVerify(type) {
        if (!currentUser) return alert("Bạn cần Đăng nhập/Đăng ký trước!");
        document.getElementById(type + '-verify').style.display = 'block';
    }

    function completeTask(type) {
        let user = users[currentUser];
        let check = confirm("Đức Anh Thu Sâm Check: Bạn đã thực hiện đúng yêu cầu chưa?");
        if (check) {
            if (type === 'yt') user.ytDone = true;
            if (type === 'tt') user.ttDone = true;
            user.score += 20;
            saveData();
            updateUI();
            alert("Tuyệt vời! Bạn nhận được +20 điểm.");
        }
    }

    function grow(pts) {
        if (!currentUser) return alert("Hãy đăng nhập trước!");
        let user = users[currentUser];
        if (user.isBlocked) return alert("Bạn không thể thực hiện hành động vì đã bị khóa!");
        const today = new Date().toLocaleDateString('vi-VN');
        if (user.lastDate !== today) { user.tasksDone = 0; user.lastDate = today; }

        if (user.tasksDone < 4) {
            user.score += pts;
            user.tasksDone++;
            saveData();
            updateUI();
        } else { alert("Hết lượt hôm nay!"); }
    }

    function updateUI() {
        if (!currentUser || !users[currentUser]) return;
        let user = users[currentUser];
        document.getElementById('score-num').innerText = user.score;
        document.getElementById('tasks-left').innerText = 4 - user.tasksDone;
        
        if (user.ytDone) {
            document.getElementById('yt-actions').innerHTML = '<button class="btn-done-status">Đã nhận +20đ</button>';
        }
        if (user.ttDone) {
            document.getElementById('tt-actions').innerHTML = '<button class="btn-done-status">Đã nhận +20đ</button>';
        }
        if (user.score >= 200) document.getElementById('reward-link').style.display = 'block';
        document.querySelectorAll('.plant-card').forEach(b => b.disabled = (user.tasksDone >= 4));
    }

    // PHẦN ADMIN NÂNG CAO
    function openAdmin() {
        if (prompt("Nhập mật khẩu Admin:") === "24102014") {
            renderAdminList();
            toggleModal('admin-modal');
        } else { alert("Sai mật khẩu!"); }
    }

    function renderAdminList() {
        const body = document.getElementById('admin-user-list-body');
        body.innerHTML = "";
        for (let u in users) {
            let user = users[u];
            let statusText = u === currentUser ? '<span class="status-on">Online</span>' : '<span class="status-off">Offline</span>';
            if(user.isBlocked) statusText = '<span class="status-blocked">BỊ KHÓA</span>';

            body.innerHTML += `
                <tr>
                    <td>${u}<br>(${user.pass})</td>
                    <td><b>${user.score}đ</b></td>
                    <td>${statusText}</td>
                    <td>
                        <button class="btn-action" style="background:#f39c12" onclick="blockUser('${u}')" title="Khóa/Mở">🚫</button>
                        <button class="btn-action" style="background:#e74c3c" onclick="deleteUser('${u}')" title="Xóa">🗑️</button>
                    </td>
                </tr>
            `;
        }
    }

    function blockUser(username) {
        users[username].isBlocked = !users[username].isBlocked;
        saveData();
        renderAdminList();
    }

    function deleteUser(username) {
        if(confirm("Xóa vĩnh viễn tài khoản " + username + "?")) {
            delete users[username];
            if(currentUser === username) logout();
            saveData();
            renderAdminList();
        }
    }

    function saveData() { localStorage.setItem('garden_users', JSON.stringify(users)); }
</script>
</body>
</html>
