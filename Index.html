<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garden Quest - Đức Anh Thu Sâm</title>
    <style>
        :root { --primary: #27ae60; --dark: #2c3e50; --danger: #e74c3c; }
        body { font-family: 'Segoe UI', sans-serif; background: #96e6a1; margin: 0; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .main-card { background: white; width: 100%; max-width: 400px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); overflow: hidden; position: relative; padding-bottom: 20px;}
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #f8f9fa; }
        .user-avatar { width: 40px; height: 40px; background: #ddd; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .stats-section { padding: 20px; text-align: center; }
        .score-circle { width: 100px; height: 100px; border: 5px solid #eee; border-top: 5px solid orange; border-radius: 50%; margin: 10px auto; display: flex; flex-direction: column; justify-content: center; }
        .garden-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .plant-card { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 15px; cursor: pointer; font-weight: bold; }
        
        /* GIAO DIỆN NHIỆM VỤ NGƯỜI MỚI GIỐNG CŨ */
        .newbie-tasks { background: #fffde7; padding: 15px; border-radius: 15px; border: 2px solid #fbc02d; margin: 0 20px; text-align: left; }
        .newbie-tasks h4 { margin: 0 0 10px 0; color: #f57f17; }
        .task-item { background: white; padding: 10px; border-radius: 10px; margin-bottom: 8px; border: 1px solid #fff9c4; font-size: 13px; }
        .task-actions { display: flex; gap: 5px; margin-top: 5px; }
        .btn-link { background: #2196F3; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; text-decoration: none; flex: 1; text-align: center; display: block; }
        .btn-verify { background: #f57f17; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: 11px; flex: 1; display: none; }
        .btn-done-status { background: #ccc; color: white; border: none; padding: 5px 8px; border-radius: 5px; cursor: not-allowed; font-size: 11px; width: 100%; margin-top: 5px; }

        .modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 100; padding: 20px; box-sizing: border-box; }
        .modal-active { display: block; animation: slideIn 0.3s; }
        @keyframes slideIn { from { transform: translateY(-100%); } to { transform: translateY(0); } }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-bottom: 10px; }
        .btn-main { background: var(--primary); color: white; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="top-bar">
        <div class="user-avatar" onclick="toggleModal('auth-modal')">👤</div>
        <div id="username-display" style="font-weight: bold; color: var(--primary);">Khách</div>
    </div>

    <div class="header">
        <h2 style="margin:0">Vườn Cây Acc Free</h2>
        <small id="current-date"></small>
    </div>

    <div class="stats-section">
        <div class="score-circle">
            <span id="score-num" style="font-size: 24px; font-weight: bold;">0</span>
            <span style="font-size: 10px;">/ 200 ĐIỂM</span>
        </div>
        <p style="font-weight:bold; color: #d35400;">Lượt hôm nay: <span id="tasks-left">4</span>/4</p>
        <div class="garden-grid">
            <button class="plant-card" onclick="grow(3)">🥬 Cải (+3)</button>
            <button class="plant-card" onclick="grow(5)">🍆 Cà Tím (+5)</button>
            <button class="plant-card" onclick="grow(7)">🍅 Cà Chua (+7)</button>
            <button class="plant-card" onclick="grow(10)">🥕 Cà Rốt (+10)</button>
        </div>
    </div>

    <div class="newbie-tasks">
        <h4>🎁 Nhiệm vụ người mới</h4>
        
        <div class="task-item" id="task-yt-box">
            <span>1. Đăng ký YouTube Admin</span>
            <div class="task-actions" id="yt-actions">
                <a href="https://youtube.com/@nhancodeptg05" target="_blank" class="btn-link" onclick="showVerify('yt')">Mở Link YouTube</a>
                <button id="yt-verify" class="btn-verify" onclick="completeTask('yt')">Xác Nhận Đã Đăng Ký</button>
            </div>
        </div>

        <div class="task-item" id="task-tt-box">
            <span>2. Follow TikTok Admin</span>
            <div class="task-actions" id="tt-actions">
                <a href="https://www.tiktok.com/@thusamplay_2410" target="_blank" class="btn-link" onclick="showVerify('tt')">Mở Link TikTok</a>
                <button id="tt-verify" class="btn-verify" onclick="completeTask('tt')">Xác Nhận Đã Follow</button>
            </div>
        </div>
        <p id="social-msg" style="font-size: 10px; color: #888; text-align: center; margin-top: 5px;">Làm cả 2 nhiệm vụ để nhận tổng 9 điểm.</p>
    </div>

    <div id="auth-modal" class="modal">
        <h3 id="auth-title">Đăng Ký Tài Khoản</h3>
        <input type="text" id="auth-user" placeholder="Tên đăng nhập">
        <input type="password" id="auth-pass" placeholder="Mật khẩu">
        <button class="btn btn-main" onclick="handleAuth()">Xác Nhận</button>
        <button class="btn" style="background:#eee" onclick="switchAuth()">Chuyển sang Đăng nhập / Đăng ký</button>
        <button class="btn" style="background:var(--danger); color:white" onclick="toggleModal('auth-modal')">Đóng</button>
    </div>
</div>

<script>
    const API_URL = "https://sheetdb.io/api/v1/rcuexwt4g47ql"; 
    
    let users = JSON.parse(localStorage.getItem('garden_users')) || {};
    let currentUser = null;
    let isLoginMode = false;
    let userData = { score: 0, tasksDone: 0, ytDone: false, ttDone: false, socialAwarded: false };

    document.getElementById('current-date').innerText = new Date().toLocaleDateString('vi-VN');

    function toggleModal(id) { document.getElementById(id).classList.toggle('modal-active'); }
    function switchAuth() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "Đăng Nhập" : "Đăng Ký Tài Khoản";
    }

    function handleAuth() {
        const u = document.getElementById('auth-user').value.trim();
        const p = document.getElementById('auth-pass').value.trim();
        if(!u || !p) return alert("Vui lòng điền đủ!");

        if (isLoginMode) {
            if (users[u] && users[u].pass === p) {
                currentUser = u;
                userData = users[u];
            } else { return alert("Sai tài khoản hoặc mật khẩu!"); }
        } else {
            if (users[u]) return alert("Tên đã tồn tại!");
            currentUser = u;
            // ÉP ĐIỂM VỀ 0 KHI ĐĂNG KÝ
            userData = { pass: p, score: 0, tasksDone: 0, ytDone: false, ttDone: false, socialAwarded: false };
            users[u] = userData;
            syncWithAdmin("Đăng ký mới");
        }
        document.getElementById('username-display').innerText = currentUser;
        saveData();
        updateUI();
        toggleModal('auth-modal');
    }

    function showVerify(type) {
        if (!currentUser) return alert("Bạn cần Đăng ký trước!");
        document.getElementById(type + '-verify').style.display = 'block';
    }

    function completeTask(type) {
        if (type === 'yt') userData.ytDone = true;
        if (type === 'tt') userData.ttDone = true;

        if (userData.ytDone && userData.ttDone && !userData.socialAwarded) {
            userData.score += 9;
            userData.socialAwarded = true;
            alert("Chúc mừng! Bạn đã hoàn thành 2 nhiệm vụ và nhận 9 điểm.");
            syncWithAdmin("Nhận 9đ Social");
        } else {
            alert("Đã xác nhận! Hãy làm nốt nhiệm vụ còn lại để nhận 9 điểm.");
        }
        saveData();
        updateUI();
    }

    function grow(pts) {
        if (!currentUser) return alert("Hãy đăng ký trước!");
        if (userData.tasksDone < 4) {
            userData.score += pts;
            userData.tasksDone++;
            saveData();
            updateUI();
            syncWithAdmin("Trồng cây");
        } else { alert("Hết lượt hôm nay!"); }
    }

    function updateUI() {
        if (!currentUser) return;
        document.getElementById('score-num').innerText = userData.score;
        document.getElementById('tasks-left').innerText = 4 - userData.tasksDone;

        if (userData.socialAwarded) {
            document.getElementById('yt-actions').innerHTML = '<button class="btn-done-status">Đã xong ✅</button>';
            document.getElementById('tt-actions').innerHTML = '<button class="btn-done-status">Đã xong ✅</button>';
        } else {
            if (userData.ytDone) document.getElementById('yt-verify').innerText = "Đã xác nhận YouTube";
            if (userData.ttDone) document.getElementById('tt-verify').innerText = "Đã xác nhận TikTok";
        }
    }

    function saveData() {
        if (currentUser) users[currentUser] = userData;
        localStorage.setItem('garden_users', JSON.stringify(users));
    }

    function syncWithAdmin(action) {
        fetch(API_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                "Username": currentUser,
                "Score": userData.score,
                "Date": new Date().toLocaleString('vi-VN'),
                "Note": action
            })
        });
    }
</script>
</body>
</html>
